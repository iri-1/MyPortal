<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規ユーザー登録 – My Portal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="register-page">
    <div class="register-card">
        <h2>🌸 新規ユーザー登録</h2>
        <div class="field">
            <label>自分のURL（ログインID）</label>
            <input type="text" id="reg-id" placeholder="例: yamada" pattern="[a-zA-Z0-9_-]+"
                title="半角英数字とハイフン、アンダースコアのみ">
            <div class="desc">あなたの専用ページは「ドメイン/<b>ここに入力した文字</b>」になります。</div>
        </div>
        <div class="field">
            <label>設定パスワード</label>
            <input type="password" id="reg-pass" placeholder="ログイン時のパスワード">
        </div>
        <hr style="border:none;border-top:1px dashed var(--border);margin:24px 0;">
        <div class="field">
            <label>表示名（名前）</label>
            <input type="text" id="reg-name" placeholder="ポータル上の表示名">
        </div>
        <div class="field">
            <label>お誕生日</label>
            <input type="date" id="reg-bday">
        </div>

        <button class="btn" onclick="doRegister()" id="submit-btn">登録してマイポータルを開く</button>
        <a href="index.html" class="back-link"><span>←</span> トップページへ戻る</a>
    </div>

    <script>
        async function doRegister() {
            const id = document.getElementById('reg-id').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value.trim();
            const bday = document.getElementById('reg-bday').value;

            if (!id || !pass || !name) {
                alert('URL(ID)、パスワード、表示名は必須です。');
                return;
            }
            if (!/^[a-zA-Z0-9_-]+$/.test(id)) {
                alert('URLには半角英数字、ハイフン、アンダースコアのみ使用できます。');
                return;
            }
            if (id === 'admin' || id === 'register' || id === 'index') {
                alert('このURLは特別な用途で予約されているため使用できません。');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '処理中...';

            try {
                const resp = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'register', id, pass, name, bday })
                });
                
                const data = await resp.json();
                
                if (!resp.ok) {
                    if (resp.status === 409) {
                        alert('このURL(ID)はすでに使われています。別の文字を指定してください。');
                    } else {
                        alert('登録エラー: ' + (data.error || '不明なエラー'));
                    }
                    btn.disabled = false;
                    btn.textContent = '登録してマイポータルを開く';
                    return;
                }

                localStorage.setItem('logged_in_user', id);
                setTimeout(() => {
                    window.location.href = 'index.html?u=' + encodeURIComponent(id);
                }, 800);
            } catch (err) {
                console.error(err);
                alert('通信エラーが発生しました。Vercelバックエンドの設定を確認してください。');
                btn.disabled = false;
                btn.textContent = '登録してマイポータルを開く';
            }
        }
    </script>
</body>

</html>
